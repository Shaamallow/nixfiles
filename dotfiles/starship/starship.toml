"$schema" = 'https://starship.rs/config-schema.json'

format = """
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$line_break\
$character"""

right_format = """
$conda\
$python
$cmd_duration\
"""

[os]
format = "[$symbol]($style) "
style = "bold white"
disabled = false

# You can customize the icons for your specific operating systems here.
# These use standard Nerd Font icons.
[os.symbols]
Macos = "п…№ "
Windows = "у°ЌІ "
Ubuntu = "пЊ› "
Debian = "пЊ† "
Arch = "пЊѓ "
Mint = "пЊЋ "
Fedora = "пЊЉ "
CentOS = "пЊ„ "
Linux = "п…ј "
Raspbian = "пЊ• "

[directory]
style = "blue"
# Added a folder icon before the path, and a lock icon if the directory is read-only
format = "[пЃј $path]($style)[$read_only]($read_only_style) "
read_only = " пЂЈ"

[character]
success_symbol = "[вќЇ](purple)"
error_symbol = "[вќЇ](red)"
vimcmd_symbol = "[вќ®](green)"

[git_branch]
# Added the classic git branch icon
format = "[п„¦ $branch]($style) "
style = "green"

[git_status]
# Removed the overarching color wrapper so individual colors can shine
format = "$conflicted$untracked$modified$staged$renamed$deleted$ahead_behind$stashed"
style = "cyan"
conflicted = "[рџЏі ](bold red)"
untracked = "[п„Ё ](bright-blue)"
