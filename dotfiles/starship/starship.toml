[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
# Added the hourglass icon for command execution time
format = "[п‰’ $duration]($style) "
style = "yellow"

[python]
# Added the Python logo icon
format = "[оњј $virtualenv]($style) "
style = "teal"
detect_extensions = []
